<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mapel & Kelas | CBT System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* style asli - tidak diubah */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #eef0f5; min-height: 100vh; padding: 0 0 2rem 0; display: flex; justify-content: center; }
        .main-wrapper { width: 90%; max-width: 1200px; margin: 0 auto; margin-top: max(4px, calc(env(safe-area-inset-top, 4px) / 2)); }
        .top-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; background: #eef0f5; border-radius: 60px; padding: 0.8rem 2rem; margin-bottom: 2rem; box-shadow: 12px 12px 24px #bebebe, -8px -8px 18px #ffffff; }
        .logo-area .brand { display: flex; align-items: center; gap: 12px; }
        .cbt-logo { font-size: 2.2rem; background: linear-gradient(145deg, #7c5e9a, #4a3b6e); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .brand h2 { font-size: 1.4rem; font-weight: 700; color: #3c2e5a; }
        .brand p { font-size: 0.7rem; font-weight: 500; color: #7d6b9e; }
        .status-area .online-status { display: flex; align-items: center; gap: 8px; background: #eef0f5; padding: 6px 18px; border-radius: 40px; font-weight: 600; font-size: 0.85rem; color: #2b7a4b; box-shadow: inset 2px 2px 5px #bebebe, inset -3px -3px 7px #ffffff; }
        .led.online { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
        .admin-area { display: flex; align-items: center; gap: 20px; }
        .admin-info { display: flex; align-items: center; gap: 12px; background: #eef0f5; padding: 6px 18px; border-radius: 50px; box-shadow: inset 1px 1px 3px #bebebe, inset -2px -2px 5px #ffffff; }
        .admin-info i { font-size: 1.8rem; color: #8b6cb0; }
        .admin-role { font-size: 0.7rem; font-weight: 500; color: #7b6b9b; }
        .admin-name { font-size: 0.9rem; font-weight: 700; color: #3c2e5a; }
        .logout-btn { background: linear-gradient(145deg, #e2e6ec, #f0f4fa); padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; font-weight: 600; color: #5a3a7a; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 8px 8px 16px #bebebe, -4px -4px 8px #ffffff; transition: 0.2s; }
        .logout-btn:hover { transform: translateY(-2px); }
        .nav-bar { margin-bottom: 1.5rem; }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; background: #eef0f5; padding: 0.6rem 1.5rem; border-radius: 40px; text-decoration: none; color: #4a3570; font-weight: 600; font-size: 0.85rem; box-shadow: 6px 6px 12px #bebebe, -4px -4px 8px #ffffff; }
        .btn-back:hover { transform: translateX(-5px); }
        .page-title { margin-bottom: 1.5rem; }
        .page-title h1 { font-size: 1.8rem; font-weight: 700; color: #2d2a4a; display: flex; align-items: center; gap: 12px; }
        .page-title p { color: #5e4a7c; font-size: 0.9rem; margin-top: 5px; }
        .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 2rem; }
        .form-card, .table-card { background: rgba(248, 244, 255, 0.65); backdrop-filter: blur(8px); border-radius: 32px; padding: 1.5rem; box-shadow: 15px 15px 30px rgba(0,0,0,0.1), -10px -10px 20px rgba(255,255,245,0.7); }
        .form-card h3, .table-card h3 { font-size: 1.2rem; font-weight: 700; color: #2b2b4a; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 1rem; }
        .form-group input { width: 100%; padding: 12px 18px; border: none; background: #eef0f5; border-radius: 60px; font-size: 0.9rem; box-shadow: inset 3px 3px 6px #bebebe, inset -2px -2px 4px #ffffff; outline: none; }
        .btn-submit { background: linear-gradient(145deg, #7d64a8, #5a3e7c); color: white; border: none; padding: 10px 28px; border-radius: 60px; font-weight: 600; cursor: pointer; box-shadow: 8px 8px 16px #bebebe, -4px -4px 8px #ffffff; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid rgba(128, 100, 162, 0.15); }
        th { font-weight: 600; color: #4a3570; font-size: 0.8rem; text-transform: uppercase; }
        .btn-delete { background: #eef0f5; padding: 5px 12px; border-radius: 40px; font-size: 0.7rem; color: #ef4444; text-decoration: none; font-weight: 600; box-shadow: 4px 4px 8px #bebebe, -2px -2px 4px #ffffff; display: inline-flex; align-items: center; gap: 5px; border: none; cursor: pointer; }
        .btn-delete:hover { background: #fee2e2; }
        @media (max-width: 860px) { .two-columns { grid-template-columns: 1fr; } .top-header { flex-direction: column; text-align: center; } .admin-area, .status-area { width: 100%; justify-content: center; } .main-wrapper { width: 95%; } .nav-bar { display: flex; justify-content: center; } }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div class="top-header">
        <div class="logo-area"><div class="brand"><span class="cbt-logo">📚</span><div><h2>CBT System</h2><p>SMP MAARIF TEGALAMPEL</p></div></div></div>
        <div class="status-area"><div class="online-status"><span class="led online"></span><span>ONLINE</span></div></div>
        <div class="admin-area">
            <div class="admin-info"><i class="fas fa-user-circle"></i><div><span class="admin-role">Administrator</span><span class="admin-name">Administrator Utama</span></div></div>
            <a href="logout.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Keluar</a>
        </div>
    </div>
    
    <div class="nav-bar">
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
    </div>
    
    <div class="page-title"><h1><i class="fas fa-book-open"></i> Mata Pelajaran & Kelas</h1><p>Kelola mata pelajaran dan kelas yang tersedia</p></div>
    
    <div class="two-columns">
        <div class="form-card">
            <h3><i class="fas fa-book"></i> Tambah Mata Pelajaran</h3>
            <form id="formMapel">
                <div class="form-group"><input type="text" id="namaMapel" placeholder="Nama Mata Pelajaran" required></div>
                <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Simpan Mapel</button>
            </form>
        </div>
        <div class="form-card">
            <h3><i class="fas fa-building"></i> Tambah Kelas</h3>
            <form id="formKelas">
                <div class="form-group"><input type="text" id="namaKelas" placeholder="Nama Kelas (contoh: 9A)" required></div>
                <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Simpan Kelas</button>
            </form>
        </div>
    </div>
    
    <div class="two-columns">
        <div class="table-card">
            <h3><i class="fas fa-list"></i> Daftar Mata Pelajaran</h3>
            <table id="tabelMapel">
                <thead><tr><th>No</th><th>Mata Pelajaran</th><th>Aksi</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="table-card">
            <h3><i class="fas fa-list"></i> Daftar Kelas</h3>
            <table id="tabelKelas">
                <thead><tr><th>No</th><th>Kelas</th><th>Aksi</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
<script src="config.js"></script>
<script>
    async function request(url, options = {}) {
        const res = await fetch(url, { ...options, credentials: 'include', headers: { 'Content-Type': 'application/json', ...options.headers } });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }
    async function loadMapel() {
        try {
            const data = await request(`${API_BASE}/api/mapel`);
            const tbody = document.querySelector('#tabelMapel tbody');
            tbody.innerHTML = '';
            data.forEach((m, i) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = i + 1;
                row.insertCell(1).innerText = m.nama_mapel;
                const actionCell = row.insertCell(2);
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete';
                delBtn.innerHTML = '<i class="fas fa-trash-alt"></i> Hapus';
                delBtn.onclick = () => hapusMapel(m.id);
                actionCell.appendChild(delBtn);
            });
        } catch (err) { console.error('Gagal load mapel:', err); alert('Gagal memuat mapel'); }
    }
    async function tambahMapel(nama) { await request(`${API_BASE}/api/mapel`, { method: 'POST', body: JSON.stringify({ nama_mapel: nama }) }); loadMapel(); }
    async function hapusMapel(id) { if(confirm('Yakin hapus mata pelajaran ini?')) { await request(`${API_BASE}/api/mapel/${id}`, { method: 'DELETE' }); loadMapel(); } }
    async function loadKelas() {
        try {
            const data = await request(`${API_BASE}/api/kelas`);
            const tbody = document.querySelector('#tabelKelas tbody');
            tbody.innerHTML = '';
            data.forEach((k, i) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = i + 1;
                row.insertCell(1).innerText = k.nama_kelas;
                const actionCell = row.insertCell(2);
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete';
                delBtn.innerHTML = '<i class="fas fa-trash-alt"></i> Hapus';
                delBtn.onclick = () => hapusKelas(k.id);
                actionCell.appendChild(delBtn);
            });
        } catch (err) { console.error('Gagal load kelas:', err); alert('Gagal memuat kelas'); }
    }
    async function tambahKelas(nama) { await request(`${API_BASE}/api/kelas`, { method: 'POST', body: JSON.stringify({ nama_kelas: nama }) }); loadKelas(); }
    async function hapusKelas(id) { if(confirm('Yakin hapus kelas ini? Semua siswa di kelas ini akan terpengaruh.')) { await request(`${API_BASE}/api/kelas/${id}`, { method: 'DELETE' }); loadKelas(); } }
    
    document.getElementById('formMapel').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nama = document.getElementById('namaMapel').value.trim();
        if (!nama) return alert('Nama mata pelajaran tidak boleh kosong');
        try { await tambahMapel(nama); document.getElementById('namaMapel').value = ''; } catch (err) { alert('Gagal menambah mapel: ' + err.message); }
    });
    document.getElementById('formKelas').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nama = document.getElementById('namaKelas').value.trim();
        if (!nama) return alert('Nama kelas tidak boleh kosong');
        try { await tambahKelas(nama); document.getElementById('namaKelas').value = ''; } catch (err) { alert('Gagal menambah kelas: ' + err.message); }
    });
    loadMapel();
    loadKelas();
</script>
</body>
</html>
