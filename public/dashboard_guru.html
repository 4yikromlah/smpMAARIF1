<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru | CBT System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #eef0f5; display: flex; justify-content: center; padding: 0 0 2rem 0; }
        .main-wrapper { width: 90%; max-width: 1200px; margin: 0 auto; margin-top: max(4px, calc(env(safe-area-inset-top, 4px) / 2)); }
        .top-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; background: #eef0f5; border-radius: 60px; padding: 0.8rem 2rem; margin-bottom: 2rem; box-shadow: 12px 12px 24px #bebebe, -8px -8px 18px #ffffff; }
        .logo-area .brand { display: flex; align-items: center; gap: 12px; }
        .cbt-logo { font-size: 2.2rem; background: linear-gradient(145deg, #7c5e9a, #4a3b6e); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .brand h2 { font-size: 1.4rem; font-weight: 700; color: #3c2e5a; }
        .brand p { font-size: 0.7rem; font-weight: 500; color: #7d6b9e; }
        .admin-area { display: flex; align-items: center; gap: 20px; }
        .admin-info { display: flex; align-items: center; gap: 12px; background: #eef0f5; padding: 6px 18px; border-radius: 50px; box-shadow: inset 1px 1px 3px #bebebe, inset -2px -2px 5px #ffffff; }
        .admin-info i { font-size: 1.8rem; color: #8b6cb0; }
        .admin-role { font-size: 0.7rem; font-weight: 500; color: #7b6b9b; }
        .admin-name { font-size: 0.9rem; font-weight: 700; color: #3c2e5a; }
        .logout-btn { background: linear-gradient(145deg, #e2e6ec, #f0f4fa); padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; font-weight: 600; color: #5a3a7a; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 8px 8px 16px #bebebe, -4px -4px 8px #ffffff; transition: 0.2s; }
        .logout-btn:hover { transform: translateY(-2px); }
        .dashboard-title { margin-bottom: 2rem; }
        .dashboard-title h1 { font-size: 1.8rem; font-weight: 700; color: #2d2a4a; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; margin-bottom: 48px; }
        .stat-card { background: #eef0f5; border-radius: 32px; padding: 1.5rem; text-align: center; box-shadow: 12px 12px 24px #bebebe, -8px -8px 18px #ffffff; position: relative; }
        .stat-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--color); border-radius: 32px 0 0 32px; }
        .stat-card:nth-child(1) { --color: #3b82f6; } .stat-card:nth-child(2) { --color: #10b981; } .stat-card:nth-child(3) { --color: #f59e0b; }
        .stat-title { font-size: 0.85rem; font-weight: 600; color: #5a4a7a; margin-bottom: 12px; }
        .stat-number { font-size: 2.6rem; font-weight: 800; background: linear-gradient(145deg, #2b3b5e, #402f62); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .table-card { background: rgba(248,244,255,0.65); backdrop-filter: blur(8px); border-radius: 32px; padding: 1.8rem; box-shadow: 15px 15px 30px rgba(0,0,0,0.1), -10px -10px 20px rgba(255,255,245,0.7); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid rgba(128,100,162,0.15); }
        th { font-weight: 600; color: #4a3570; font-size: 0.8rem; text-transform: uppercase; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; background: #eef0f5; }
        .badge-aktif { background: #10b981; color: white; }
        .badge-nonaktif { background: #ef4444; color: white; }
        .token-code { font-family: monospace; background: #2d2a4a; color: #eef0f5; padding: 4px 10px; border-radius: 40px; font-size: 0.8rem; }
        .btn-detail { background: #eef0f5; padding: 5px 14px; border-radius: 40px; font-size: 0.7rem; color: #4a3570; text-decoration: none; box-shadow: 4px 4px 8px #bebebe, -2px -2px 4px #ffffff; display: inline-flex; align-items: center; gap: 5px; }
        @media (max-width:860px) { .stats-grid { grid-template-columns: 1fr; } .top-header { flex-direction: column; text-align: center; } .admin-area { width: 100%; justify-content: center; } }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div class="top-header">
        <div class="logo-area"><div class="brand"><span class="cbt-logo">📚</span><div><h2>CBT System</h2><p>SMP MAARIF TEGALAMPEL</p></div></div></div>
        <div class="admin-area">
            <div class="admin-info"><i class="fas fa-chalkboard-user"></i><div><span class="admin-role">Guru</span><span class="admin-name" id="guruNama">Loading...</span></div></div>
            <a href="logout_guru.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Keluar</a>
        </div>
    </div>
    <div class="dashboard-title">
        <h1><i class="fas fa-chalkboard-user"></i> Dashboard Guru</h1>
        <p id="guruInfo">Selamat datang, silakan login</p>
    </div>
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-title">UJIAN DIAWASI</div><div class="stat-number" id="totalPengawasan">0</div></div>
        <div class="stat-card"><div class="stat-title">SISWA SELESAI</div><div class="stat-number" id="totalSelesai">0</div></div>
        <div class="stat-card"><div class="stat-title">UJIAN AKTIF</div><div class="stat-number" id="ujianAktifCount">0</div></div>
    </div>
    <div class="table-card">
        <h3><i class="fas fa-eye"></i> Ujian yang Diawasi</h3>
        <table id="daftarUjian">
            <thead><tr><th>No</th><th>Nama Ujian</th><th>Mapel</th><th>Waktu Mulai</th><th>Waktu Akhir</th><th>Durasi</th><th>Token</th><th>Status</th><th>Peserta Selesai</th><th>Aksi</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="config.js"></script>
<script>
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function loadGuruData() {
        try {
            const res = await fetch(`${API_BASE}/api/auth/me`, { credentials: 'include' });
            if (!res.ok) throw new Error('Sesi tidak valid');
            const user = await res.json();
            document.getElementById('guruNama').innerText = escapeHtml(user.nama);
            document.getElementById('guruInfo').innerHTML = `Selamat datang, ${escapeHtml(user.nama)} (NIP: ${escapeHtml(user.nip || '-')})`;
        } catch(e) {
            console.error(e);
            window.location.href = 'login_guru.html';
        }
    }

    async function loadDashboard() {
        try {
            const res = await fetch(`${API_BASE}/api/guru/dashboard`, { credentials: 'include' });
            if (!res.ok) throw new Error('Gagal memuat dashboard');
            const data = await res.json();
            document.getElementById('totalPengawasan').innerText = data.jumlahPengawasan || 0;
            document.getElementById('totalSelesai').innerText = data.siswaSelesai || 0;
            document.getElementById('ujianAktifCount').innerText = data.ujianAktif || 0;
            const tbody = document.querySelector('#daftarUjian tbody');
            tbody.innerHTML = '';
            if (!data.ujian || data.ujian.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;">Tidak ada ujian yang diawasi</td></tr>';
                return;
            }
            (data.ujian || []).forEach((u, i) => {
                const statusClass = u.status === 'aktif' ? 'badge-aktif' : 'badge-nonaktif';
                tbody.innerHTML += `<tr>
                    <td>${i+1}</td>
                    <td><strong>${escapeHtml(u.nama_ujian)}</strong></td>
                    <td>${escapeHtml(u.mata_pelajaran?.nama_mapel || '-')}</td>
                    <td>${new Date(u.tanggal_mulai).toLocaleString()}</td>
                    <td>${new Date(u.tanggal_akhir).toLocaleString()}</td>
                    <td>${u.durasi_menit} menit</td>
                    <td><span class="token-code">${escapeHtml(u.token || '-')}</span></td>
                    <td><span class="badge ${statusClass}">${u.status.toUpperCase()}</span></td>
                    <td>${u.selesai_count || 0} / ${u.total_siswa || 0}</td>
                    <td><a href="guru_detail_ujian.html?id=${u.id}" class="btn-detail"><i class="fas fa-chart-line"></i> Detail</a></td>
                </tr>`;
            });
        } catch(err) {
            console.error(err);
            alert('Gagal memuat data dashboard guru');
        }
    }

    loadGuruData();
    loadDashboard();
</script>
</body>
</html>
